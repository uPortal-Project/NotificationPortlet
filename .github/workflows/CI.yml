name: CI
permissions:
  contents: write
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: 'Java 11 on ${{ matrix.platform }}'
    strategy:
      matrix:
        platform:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Generate and submit dependency graph
        if: ${{ github.event_name == 'push' }}
        uses: gradle/actions/dependency-submission@v4
      - name: Test
        run: ./gradlew check -S --no-daemon --no-parallel
